---
- name: Ensure Matomo paths exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: "{{ matomo_uid }}"
    group: "{{ matomo_gid }}"
  with_items:
    - "{{ matomo_base_path }}"
    - "{{ matomo_config_path }}"
    - "{{ matomo_data_path }}"

- name: Ensure Matomo support files created
  ansible.builtin.template:
    src: "{{ role_path }}/templates/{{ item }}.j2"
    dest: "{{ matomo_base_path }}/{{ item }}"
    mode: "0640"
    owner: "{{ matomo_uid }}"
    group: "{{ matomo_gid }}"
  with_items:
    - env
    - labels
  register: matomo_support_files_result

- name: Ensure Matomo container image is pulled via community.docker.docker_image_pull
  when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
  community.docker.docker_image_pull:
    name: "{{ matomo_container_image }}"
    pull: always
  register: matomo_container_image_pull_result_ansible_module
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: matomo_container_image_pull_result_ansible_module is not failed

- name: Ensure Matomo container image is pulled via ansible.builtin.command
  when: devture_systemd_docker_base_container_image_pull_method == 'command'
  ansible.builtin.command:
    cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ matomo_container_image }}"
  register: matomo_container_image_pull_result_command
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: matomo_container_image_pull_result_command is not failed
  changed_when: "'Downloaded newer image' in matomo_container_image_pull_result_command.stdout"

- name: Ensure Matomo container network is created via community.docker.docker_network
  when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
  community.docker.docker_network:
    enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
    name: "{{ matomo_container_network }}"
    driver: bridge
    driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"
  register: matomo_network_creation_result

- name: Ensure Matomo container network is created via ansible.builtin.command
  when: devture_systemd_docker_base_container_network_creation_method == 'command'
  ansible.builtin.command:
    cmd: >-
      {{ devture_systemd_docker_base_host_command_docker }} network create
      {% if devture_systemd_docker_base_ipv6_enabled %}--ipv6{% endif %}
      {{ devture_systemd_docker_base_container_networks_driver_options_string }}
      {{ matomo_container_network }}
  register: matomo_network_creation_result
  changed_when: matomo_network_creation_result.rc == 0
  failed_when: matomo_network_creation_result.rc != 0 and 'already exists' not in matomo_network_creation_result.stderr

- name: Ensure Matomo systemd service installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/matomo.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ matomo_identifier }}.service"
    mode: "0644"
  register: matomo_systemd_service_result

- name: Determine whether Matomo needs a restart
  ansible.builtin.set_fact:
    matomo_restart_necessary: >-
      {{
        matomo_support_files_result.changed | default(false)
        or matomo_systemd_service_result.changed | default(false)
        or matomo_container_image_pull_result_ansible_module.changed | default(false)
        or matomo_container_image_pull_result_command.changed | default(false)
      }}
